services:
  db:
    image: postgres:16-alpine
    container_name: interview-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: interview
      POSTGRES_DB: interview
    ports:
      - "5435:5432"
    volumes:
      - interview_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview -d interview"]
      interval: 5s
      timeout: 5s
      retries: 5

  java-backend:
    build: ./java-backend
    container_name: interview-java
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      OWNER_EMAILS: ${OWNER_EMAILS:-vinci.loca1@gmail.com,m@m.com}
    volumes:
      - interview_cv_uploads:/app/uploads/cv
    depends_on:
      db:
        condition: service_healthy
  python-ai:
    build: ./python-ai
    container_name: interview-python-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://interview:interview@db:5432/interview
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OWNER_EMAILS: ${OWNER_EMAILS:-vinci.loca1@gmail.com,m@m.com}
    depends_on:
      db:
        condition: service_healthy
      java-backend:
        condition: service_started

volumes:
  interview_pgdata:
  interview_cv_uploads:
