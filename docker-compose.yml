services:
  db:
    image: postgres:16-alpine
    container_name: interview-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: interview
      POSTGRES_DB: interview
    ports:
      - "5435:5432"
    volumes:
      - interview_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview -d interview"]
      interval: 5s
      timeout: 5s
      retries: 5

  java-backend:
    build: ./java-backend
    container_name: interview-java
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
      python-ai:
        condition: service_started
  python-ai:
    build: ./python-ai
    container_name: interview-python-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"

volumes:
  interview_pgdata:
