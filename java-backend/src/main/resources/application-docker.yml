spring:
  datasource:
    url: jdbc:postgresql://db:5432/interview
    username: interview
    password: interview
    driver-class-name: org.postgresql.Driver

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  python-ai:
    base-url: http://python-ai:8001
    read-timeout-ms: 600000